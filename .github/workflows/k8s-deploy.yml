name: Kubernetes Deployment

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'kubernetes/**'
      - 'docker-compose.yml'
      - '.github/workflows/k8s-deploy.yml'
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/afribok-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/afribok-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-k8s:
    needs: build-backend
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
    
    - name: Deploy to Kubernetes
      run: |
        chmod +x scripts/deploy-k8s.sh
        ./scripts/deploy-k8s.sh
      env:
        IMAGE_TAG: ${{ github.sha }}
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/afribok-backend -n afribok --timeout=5m
        kubectl get svc -n afribok
        kubectl get pods -n afribok

  smoke-tests:
    needs: deploy-k8s
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Wait for services
      run: sleep 30
    
    - name: Test API health
      run: |
        for i in {1..5}; do
          if curl -f http://afribok-backend.afribok.svc.cluster.local/health; then
            echo "API is healthy"
            exit 0
          fi
          sleep 10
        done
        echo "API health check failed"
        exit 1
